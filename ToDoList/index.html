<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>To-Do List</title>
</head>
<body>
    <h2>To-do List</h2>
    <div class="container">
        <input type="text" placeholder="Enter a task" id="input-task" style="font-size: 18px;">
        <i class="fa-solid fa-plus" id="add-task" style="font-size: 30px;"></i>
    </div>

    <div id="incomplete">Pending Tasks</div>
    <div id="pending">
        <ul>
        </ul>
    </div>
    <div id="completed">Completed Tasks</div>
    <div id="finished">
        <ul>
        </ul>
    </div>
    <script src="todo.js"></script>
</body>
</html>
